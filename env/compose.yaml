services:
  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    restart: unless-stopped

    ports:
      - "11434:11434"
    
    volumes:
      - .ollama_data:/root/.ollama
    
    gpus: all

  qdrant:
    image: qdrant/qdrant:latest
    container_name: qdrant
    restart: unless-stopped

    ports:
      - "6333:6333"
      - "6334:6334"
    
    volumes:
      - .qdrant_data:/qdrant/storage:z